name: Warlord_Realm_Website
services:
  # Web Server Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx-web-server
    ports:
      - "1414:1414"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - warlord-realm-web

  # PHP Service
  php:
    build: ./
    image: php:8.2-fpm-alpine
    container_name: php-fpm
    volumes:
      - .:/var/www/html
    networks:
      - warlord-realm-web

  # Database MariaDB
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: kinaracantikbanget
      MYSQL_USER: dipta14
      MYSQL_PASSWORD: kinaracantik
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - warlord-realm-web

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: kinaracantikbanget
    ports:
      - "1515:80"
    depends_on:
      - mariadb
    networks:
      - warlord-realm-web

networks:
  warlord-realm-web:
    driver: bridge